name: Bug report
description: Something behaves incorrectly
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: lexweave 0.1.0 / node 22.x / macOS
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - '@lexweave/core'
        - '@lexweave/compile'
        - '@lexweave/render'
        - lexweave (CLI)
        - not sure
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Smallest input + command/code that shows the problem. For replacement bugs, include the source text, the rule set, and the observed vs expected output.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true

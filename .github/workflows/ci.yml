name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build packages + CLI
        run: npm run build

      - name: Typecheck CLI
        run: npm run typecheck:cli

      - name: Unit tests
        run: npm test

      - name: Published Fanren playground smoke
        run: |
          grep -q '凡人修仙传 · 第131章真实编译样本' docs/index.html
          grep -q 'lexweave-cli-openai@1' docs/index.html
          grep -q 'spirit stone' docs/index.html

      - name: Pack check (publishable artifacts)
        run: |
          for pkg in core compile render cli; do
            npm pack --dry-run -w packages/$pkg > /dev/null
          done

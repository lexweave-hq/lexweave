# Publish all four packages to npm when a version tag is pushed.
#
# Setup (once):
#   1. npm org "lexweave" must exist and your npm account must be a member.
#   2. Create a granular npm token with publish rights for lexweave + @lexweave/*
#      and add it as the NPM_TOKEN repository secret.
#
# Release flow:
#   npm version 0.x.y -ws --include-workspace-root
#   git commit -am "release: v0.x.y" && git tag v0.x.y
#   git push origin main v0.x.y        (--follow-tags misses lightweight tags)
# The workflow then publishes all four packages to npm and creates the
# GitHub Release for the tag automatically.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release for the tag
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build + test
        run: |
          npm run build
          npm test

      - name: Publish (dependency order, with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in core render compile cli; do
            npm publish --provenance -w packages/$pkg
          done

      # Only after npm publish succeeds, so the Releases page never gets ahead
      # of the registry. Skips quietly if the release was already created by
      # hand; notes are auto-generated from commits and can be edited after.
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "Lexweave ${GITHUB_REF_NAME#v}" --generate-notes --verify-tag
